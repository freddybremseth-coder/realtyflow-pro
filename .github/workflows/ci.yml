name: Build validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci --silent
      - name: Contacts API auth tests
        run: npm run test:contacts-api
      - name: Revenue Inbox tests
        run: npm run test:revenue-today
      - name: Closing Workspace tests
        run: npm run test:closing
      - name: Customer 360 tests
        run: npm run test:customer-360
      - name: Approval Center tests
        run: npm run test:approvals
      - name: After-sales tests
        run: npm run test:after-sales
      - name: Revenue Forecast tests
        run: npm run test:forecast
      - name: Commission Collection tests
        run: npm run test:commissions
      - name: Lost Lead Recovery tests
        run: npm run test:recovery
      - name: Keyholding Service Revenue tests
        run: npm run test:service-revenue
      - name: Revenue Command Center tests
        run: npm run test:revenue-command
      - name: Revenue Goals tests
        run: npm run test:revenue-goals
      - name: Lead Source Attribution tests
        run: npm run test:attribution
      - name: Revenue Data Health tests
        run: npm run test:revenue-data-health
      - name: Controlled Communications tests
        run: npm run test:communications
      - name: Calendar and Execution tests
        run: npm run test:execution
      - name: Deal Documents and Closing Pack tests
        run: npm run test:closing-pack
      - name: Financial Reporting and Monthly Close tests
        run: npm run test:monthly-close
      - name: Roles Permissions and Audit Log tests
        run: npm run test:access-control
      - name: Team Ownership and Workload tests
        run: npm run test:team-workload
      - name: Internal Alerts and Escalation tests
        run: npm run test:internal-alerts
      - name: Executive Briefing tests
        run: npm run test:executive-briefing
      - name: Operating Review and Decision Journal tests
        run: npm run test:operating-review
      - name: Build
        id: next_build
        shell: bash
        run: |
          set +e
          npm run build > build.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 80 build.log
          exit $status
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "build-placeholder"
          SUPABASE_SERVICE_ROLE_KEY: "build-placeholder"
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: next-build-log
          path: build.log
          if-no-files-found: error
          retention-days: 3
