name: Build validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci --silent
      - name: Contacts API auth tests
        run: npm run test:contacts-api
      - name: Revenue Inbox tests
        run: npm run test:revenue-today
      - name: Closing Workspace tests
        run: npm run test:closing
      - name: Build
        id: next_build
        shell: bash
        run: |
          set +e
          npm run build > build.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 80 build.log
          exit $status
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "build-placeholder"
          SUPABASE_SERVICE_ROLE_KEY: "build-placeholder"
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: next-build-log
          path: build.log
          if-no-files-found: error
          retention-days: 3
